<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Table</title>
    <link rel="stylesheet" href="style.css" />
  
       <title>Nested HTML Tables</title>
	   <style>
		   table {
			   border-collapse: collapse;
			   width: 100%;
		   }

		   table, th, td {
			   border: 1px solid black;
		   }

		   th, td {
			   padding: 8px;
			   text-align: center;
		   }

		   .black-cell {
			   background-color: black;
			   color: white;
		   }

		   .nested {
			   width: 100%;
		   }

		   u1 {
			   margin: 0;
			   padding-left: 20px;
			   text-align: left;
		   }
	   </style>
  </head>
  <body>

  <table>
	  <tr>
		  <td>
			  <table class="nested">
				  <tr>
					  <th colspan="2">Nested Table 1</th>
				  </tr>
				  <tr>
					  <td>Table 1</td>
					  <td>Table 1</td>
				  </tr>
			  </table>
		  </td>

		  <td>
			  <table class="nested">
				  <tr>
					  <th colspan="2">Nested Table 2</th>
				  </tr>
				  <tr>
					  <th>Column 1</th>
					  <th>Column 2</th>
				  </tr>
				  <tr>
					  <td>Data 1</td>
					  <td>Data 2</td>
				  </tr>
			  </table>
		  </td>
	  </tr>

	  <tr>
		  <td>
			  <table class="nested">
				  <tr>
					  <th>Nested Table 3</th>
				  </tr>
				  <tr>
					  <td>
						  <u1>
							  <li>List item 1</li>
							  <li>List item 2</li>
							  <li>List item 3</li>
						  </u1>
					  </td>
				  </tr>
		 </table>
	 </td>

	 <td>
		 <table class="nested">
			 <tr>
				 <th>Nested Table 4</th>
			 </tr>
			 <tr>
				 <td class="black-cell">HTML</td>
			 </tr>
		 </table>
	 </td>
   </tr>
</table>
	  
</body>
</html>
